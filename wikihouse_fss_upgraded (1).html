<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIKIHOUSE FSS — Ensiklopedia Negara Fiksi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#1a3a6b;--ac2:#2356a8;--acl:#e8eef8;
  --red:#A32D2D;--redl:#FCEBEB;
  --bg1:#ffffff;--bg2:#f4f5f7;--bg3:#eef0f4;
  --tx1:#1a1a2e;--tx2:#4a5568;--tx3:#8a95a3;
  --b1:#c5cdd6;--b2:#d8dfe6;--b3:#e8ecf0;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Consolas',monospace;
  --r1:4px;--r2:6px;--r3:10px;
}
body{margin:0;font-family:var(--font);background:var(--bg3);color:var(--tx1)}
#W{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--bg1);border-bottom:3px solid var(--ac);display:flex;align-items:center;gap:12px;padding:0 16px;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.logo{cursor:pointer;flex-shrink:0}
.logo img{height:46px;width:auto;object-fit:contain;border-radius:4px}
.sw{flex:1;max-width:400px;position:relative}
.sw input{width:100%;padding:7px 12px 7px 34px;font-size:13px;border-radius:var(--r2);border:0.5px solid var(--b2);background:var(--bg2);color:var(--tx1);outline:none;transition:.15s}
.sw input:focus{border-color:var(--ac2);background:white}
.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--tx3)}
.hdr-btns{display:flex;gap:6px;margin-left:auto}

/* ── BUTTONS ── */
.btn{padding:6px 12px;font-size:12px;border-radius:var(--r2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:0.5px solid var(--b2);background:var(--bg1);color:var(--tx1);font-family:var(--font);transition:.15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-blue{background:var(--ac);color:#e8eef8;border-color:var(--ac)}
.btn-blue:hover{background:var(--ac2);border-color:var(--ac2)}
.btn-green{background:#085041;color:#E1F5EE;border-color:#085041}
.btn-green:hover{background:#0a6652}
.btn-red{background:#FCEBEB;color:var(--red);border-color:#F7C1C1}
.btn-red:hover{background:#F7C1C1}
.btn-amber{background:#FAEEDA;color:#633806;border-color:#F5D79E}
.btn-amber:hover{background:#F5D79E}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:11px}

/* ── NAV TABS ── */
.navtabs{background:var(--bg1);border-bottom:0.5px solid var(--b3);display:flex;padding:0 16px;overflow-x:auto}
.nt{padding:9px 14px;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:5px}
.nt:hover{color:var(--tx1)}
.nt.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}

/* ── LAYOUT ── */
.body{display:flex;flex:1}
.sb{width:200px;background:var(--bg1);border-right:0.5px solid var(--b3);padding:.6rem 0;flex-shrink:0;overflow-y:auto}
.sl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;padding:0 .8rem;margin:14px 0 4px}
.si{padding:5px 9px;font-size:12px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:6px;border-radius:var(--r2);margin:0 4px;transition:.15s}
.si:hover{background:var(--bg2);color:var(--tx1)}
.si.on{background:#e8eef8;color:var(--ac);font-weight:600}
.si .n{margin-left:auto;font-size:10px;background:var(--bg2);color:var(--tx3);padding:1px 5px;border-radius:99px}
.content{flex:1;overflow-y:auto;max-height:calc(100vh - 110px)}
.pg{display:none;padding:1.2rem}
.pg.on{display:block}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.badge-blue{background:#e8eef8;color:var(--ac)}
.badge-green{background:#E1F5EE;color:#085041}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-red{background:#FCEBEB;color:var(--red)}
.badge-purple{background:#F0EAFA;color:#5B21B6}
.badge-teal{background:#E0F7F5;color:#0D5E58}
.badge-gray{background:var(--bg2);color:var(--tx2)}

/* ── STATS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.2rem}
.stat{background:#e8eef8;border-radius:var(--r2);padding:.75rem 1rem;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:var(--ac)}
.stat-l{font-size:10px;color:var(--ac2);margin-top:2px}

/* ── ART GRID ── */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px}
.art-card{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r3);padding:.9rem;cursor:pointer;transition:.15s}
.art-card:hover{border-color:var(--ac2);box-shadow:0 2px 10px rgba(26,58,107,.1)}
.art-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.art-card h3{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4}
.art-card p{font-size:11px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── NEWS LIST ── */
.news-list{display:flex;flex-direction:column;gap:9px}
.news-item{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r3);padding:.9rem 1rem;cursor:pointer;transition:.15s}
.news-item:hover{border-color:var(--ac2);box-shadow:0 2px 8px rgba(26,58,107,.08)}
.news-item h3{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.4}
.news-item .meta{font-size:11px;color:var(--tx3);display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap;align-items:center}
.news-item p{font-size:12px;color:var(--tx2);line-height:1.6}

/* ── SEC HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.sec-hdr h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

/* ── WIKI LAYOUT ── */
.wl{display:grid;grid-template-columns:1fr 210px;gap:1.2rem;align-items:start}
.ibox{background:var(--bg1);border:1.5px solid var(--b2);border-radius:var(--r3);font-size:12px;overflow:hidden}
.ibox-ttl{font-size:12px;font-weight:700;text-align:center;background:var(--ac);color:#e8eef8;padding:7px 8px}
.ibox-img{width:100%;height:110px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;color:#e8eef8;font-size:11px;position:relative;overflow:hidden}
.ibox-img img{width:100%;height:100%;object-fit:cover}
.ibox-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:#e8eef8;font-size:11px;text-align:center;padding:8px}
.ibox-body{padding:.6rem .75rem}
.ibox table{width:100%;border-collapse:collapse}
.ibox tr{border-bottom:0.5px solid var(--b3)}
.ibox tr:last-child{border-bottom:none}
.ibox td{padding:4px 3px;vertical-align:top;line-height:1.5}
.ibox td:first-child{color:var(--tx2);width:44%;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.ibox td:last-child{font-weight:500;color:var(--tx1);font-size:11px}
.ibox-flag{width:100%;padding:.5rem .75rem;border-top:0.5px solid var(--b3);display:flex;gap:5px;align-items:center;font-size:11px;background:var(--bg2)}

/* ── ARTICLE VIEW ── */
.atitle{font-size:24px;font-weight:700;margin-bottom:.25rem;line-height:1.3}
.asub{font-size:13px;font-style:italic;color:var(--tx2);margin-bottom:.6rem}
.adiv{border:none;border-top:0.5px solid var(--b3);margin:.4rem 0 .9rem}
.toc{background:var(--bg2);border:0.5px solid var(--b3);border-radius:var(--r2);padding:.7rem .95rem;font-size:12px;margin-bottom:.9rem;display:inline-block;min-width:180px}
.toc-t{font-weight:700;font-size:12px;margin-bottom:5px}
.toc ol{padding-left:1.2rem;color:var(--tx2)}
.toc li{padding:2px 0;cursor:pointer;font-size:11px}
.toc li:hover{color:var(--ac)}
.abody{font-size:13px;line-height:1.9}
.abody h2{font-size:15px;font-weight:700;margin:1.2rem 0 .4rem;padding-bottom:.3rem;border-bottom:1.5px solid var(--b2);color:var(--ac)}
.abody h3{font-size:13px;font-weight:700;margin:.65rem 0 .3rem;color:var(--ac2)}
.abody p{margin-bottom:.7rem}
.abody ul,.abody ol{margin:.4rem 0 .7rem 1.2rem}
.abody li{margin-bottom:3px}
.bc{font-size:11px;color:var(--tx3);margin-bottom:.65rem;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.bc span{cursor:pointer;color:var(--ac)}
.bc span:hover{text-decoration:underline}
.aacts{display:flex;gap:7px;margin-top:1.2rem;padding-top:.75rem;border-top:0.5px solid var(--b3);flex-wrap:wrap}

/* ── FORMS ── */
.fl{font-weight:600;color:var(--tx2);font-size:12px;margin-bottom:5px;display:block}
.fg{margin-bottom:.85rem}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
input[type=text],input[type=date],input[type=number],select,textarea{border:0.5px solid var(--b2);border-radius:var(--r2);padding:7px 10px;font-size:12px;background:var(--bg1);color:var(--tx1);font-family:var(--font);width:100%;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac2);box-shadow:0 0 0 2px rgba(35,86,168,.1)}
.form-card{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r3);padding:1.2rem}
.form-section{font-size:12px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .6rem;padding-bottom:.3rem;border-bottom:1.5px solid var(--b3);display:flex;align-items:center;gap:5px}

/* ── EDITOR TOOLBAR ── */
.etb{display:flex;gap:3px;padding:5px 6px;background:var(--bg2);border-radius:var(--r2) var(--r2) 0 0;border:0.5px solid var(--b3);border-bottom:none;flex-wrap:wrap}
.tb{padding:3px 7px;font-size:11px;border-radius:3px;cursor:pointer;border:none;background:transparent;color:var(--tx2);font-family:var(--font);transition:.12s}
.tb:hover{background:var(--bg1);color:var(--tx1)}
.tbsep{width:0.5px;background:var(--b3);margin:0 2px;align-self:stretch}
textarea{border-radius:0 0 var(--r2) var(--r2)!important;font-family:var(--mono);font-size:12px;resize:vertical;min-height:200px;border-top:none!important}

/* ── INFOBOX EDITOR ── */
.ibox-editor{background:var(--bg2);border:0.5px solid var(--b3);border-radius:var(--r2);padding:.75rem;margin-bottom:.5rem}
.ibox-field-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.ibox-field-row .lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;width:130px;flex-shrink:0}
.ibox-field-row input{flex:1}
.ibox-field-row .btn-xs{flex-shrink:0}
.flag-upload-zone{border:1.5px dashed var(--b2);border-radius:var(--r2);padding:.75rem;text-align:center;cursor:pointer;background:var(--bg2);transition:.15s;font-size:12px;color:var(--tx2)}
.flag-upload-zone:hover{border-color:var(--ac2);background:#e8eef8}
.flag-preview{width:100%;max-height:100px;object-fit:contain;border-radius:var(--r1);margin-top:4px}

/* ── CATS ── */
.cats-mgr{display:flex;flex-direction:column;gap:6px}
.cat-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);transition:.15s}
.cat-item:hover{border-color:var(--b1)}

/* ── UPLOAD ── */
.drop-z{border:2px dashed var(--b2);border-radius:var(--r3);padding:2rem;text-align:center;cursor:pointer;background:var(--bg2);transition:.15s}
.drop-z:hover{border-color:var(--ac2);background:#e8eef8}
.drop-z i{font-size:32px;color:var(--tx3);display:block;margin-bottom:.5rem}
.drop-z p{font-size:13px;color:var(--tx2);margin-bottom:2px}
.drop-z small{font-size:11px;color:var(--tx3)}
.file-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12px;border-bottom:0.5px solid var(--b3)}
.file-row:last-child{border-bottom:none}
.ficon{width:30px;height:30px;border-radius:var(--r2);background:#e8eef8;display:flex;align-items:center;justify-content:center;color:var(--ac);flex-shrink:0}
.pbar{height:3px;background:var(--bg2);border-radius:99px;margin-top:3px;overflow:hidden}
.pfill{height:100%;background:var(--ac);border-radius:99px}

/* ── SEARCH ── */
.sh{display:flex;gap:8px;padding:9px 12px;background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r3);margin-bottom:7px;cursor:pointer;transition:.15s}
.sh:hover{border-color:var(--ac2)}
.sh h3{font-size:14px;font-weight:600;margin-bottom:2px}
.sh p{font-size:12px;color:var(--tx2);line-height:1.5}

/* ── NOTICE ── */
.notice{background:#e8eef8;border:0.5px solid #85B7EB;border-radius:var(--r2);padding:.7rem .95rem;font-size:12px;color:var(--ac);margin-bottom:.9rem;display:flex;align-items:start;gap:8px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a3a6b 0%,#2356a8 60%,#3070c8 100%);border-radius:var(--r3);padding:1.5rem 1.75rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1.25rem;color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:rgba(255,255,255,.05);border-radius:50%}
.hero img{height:58px;width:auto;object-fit:contain;filter:brightness(0) invert(1);opacity:.9;flex-shrink:0;position:relative}
.hero-text{position:relative}
.hero-title{font-size:20px;font-weight:800;letter-spacing:.02em}
.hero-sub{font-size:12px;opacity:.8;margin-top:4px;line-height:1.5}

/* ── EMPTY ── */
.empty{text-align:center;padding:2.5rem;color:var(--tx3);font-size:13px}
.empty i{font-size:30px;display:block;margin-bottom:8px}

/* ── TABS INSIDE ── */
.inner-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--b3);margin-bottom:1rem}
.it{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:.15s}
.it:hover{color:var(--tx1)}
.it.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.it-panel{display:none}
.it-panel.on{display:block}

/* ── UPLOAD PREVIEW IMG ── */
.up-img-preview{max-width:100%;max-height:160px;border-radius:var(--r2);margin-top:6px;border:0.5px solid var(--b3)}
</style>
</head>
<body>
<div id="W">
  <div class="hdr">
    <div class="logo" onclick="gH()"><img id="logo-img" src="" alt="WIKIHOUSE FSS"/></div>
    <div class="sw"><i class="ti ti-search"></i><input type="text" id="Q" placeholder="Cari negara, tokoh, berita..." oninput="gS(this.value)"/></div>
    <div class="hdr-btns">
      <button class="btn" onclick="gN()"><i class="ti ti-news"></i>Berita</button>
      <button class="btn" onclick="gA()"><i class="ti ti-article"></i>Artikel</button>
      <button class="btn btn-blue" onclick="sEd(null,'art')"><i class="ti ti-plus"></i>Tulis Baru</button>
    </div>
  </div>
  <div class="navtabs">
    <div class="nt on" id="nt-home" onclick="gH()"><i class="ti ti-home"></i>Beranda</div>
    <div class="nt" id="nt-news" onclick="gN()"><i class="ti ti-news"></i>Berita</div>
    <div class="nt" id="nt-art" onclick="gA()"><i class="ti ti-article"></i>Artikel</div>
    <div class="nt" id="nt-cats" onclick="gCats()"><i class="ti ti-tags"></i>Kategori</div>
    <div class="nt" id="nt-up" onclick="sUpMain()"><i class="ti ti-folder-open"></i>Arsip Dokumen</div>
  </div>
  <div class="body">
    <div class="sb">
      <div class="sl">Navigasi</div>
      <div class="si on" id="si-home" onclick="gH()"><i class="ti ti-home"></i>Beranda</div>
      <div class="si" id="si-news" onclick="gN()"><i class="ti ti-news"></i>Berita</div>
      <div class="si" id="si-art" onclick="gA()"><i class="ti ti-layout-list"></i>Semua Artikel</div>
      <div class="si" id="si-cats" onclick="gCats()"><i class="ti ti-tags"></i>Kategori</div>
      <div class="si" id="si-up" onclick="sUpMain()"><i class="ti ti-folder-open"></i>Arsip Dokumen</div>
      <div class="sl" style="margin-top:8px">Kategori</div>
      <div id="sb-cats"></div>
      <div class="sl" style="margin-top:8px">Statistik</div>
      <div style="padding:0 8px 6px" id="sb-stats"></div>
    </div>
    <div class="content">
      <div id="pg-home" class="pg on"></div>
      <div id="pg-news" class="pg"></div>
      <div id="pg-art" class="pg"></div>
      <div id="pg-cats" class="pg"></div>
      <div id="pg-up" class="pg"></div>
      <div id="pg-view" class="pg"></div>
      <div id="pg-ed" class="pg"></div>
      <div id="pg-search" class="pg"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  SUPABASE CONFIG
// ═══════════════════════════════════════════════════
const SB_URL='https://ttpmnbaeyxulnsitmkvu.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cG1uYmFleXh1bG5zaXRta3Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjYwNjksImV4cCI6MjA5NDUwMjA2OX0.Nw3m17WMow32Ee9NQ28Br7NX4d75eZ6W9QDU_72BeEo';

const SB={
  async q(table,method='GET',body=null,filters=''){
    const url=`${SB_URL}/rest/v1/${table}${filters}`;
    const h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};
    const r=await fetch(url,{method,headers:h,body:body?JSON.stringify(body):null});
    if(!r.ok){const e=await r.text();throw new Error(e)}
    const t=await r.text();return t?JSON.parse(t):[];
  },
  get:(t,f='')=>SB.q(t,'GET',null,f),
  post:(t,b)=>SB.q(t,'POST',b),
  patch:(t,b,f)=>SB.q(t,'PATCH',b,f),
  del:(t,f)=>SB.q(t,'DELETE',null,f),
};

// Setup tabel otomatis jika belum ada (via RPC tidak tersedia, pakai REST langsung)
async function setupTables(){
  // Coba insert dummy lalu delete — jika gagal berarti tabel belum ada, buat via SQL API
  const tables=['wh_articles','wh_news','wh_categories','wh_documents'];
  for(const t of tables){
    try{ await SB.get(t,'?limit=1'); }
    catch(e){
      // Tabel belum ada — buat via Supabase SQL endpoint
      await fetch(`${SB_URL}/rest/v1/rpc/exec_sql`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({query:getCreateSQL(t)})
      }).catch(()=>{});
    }
  }
}

function getCreateSQL(t){
  if(t==='wh_articles') return `create table if not exists wh_articles (id bigserial primary key, title text, sub text, cat text, author text, date text, tag text, body text, ibox_data jsonb, flag_img text, created_at timestamptz default now());`;
  if(t==='wh_news') return `create table if not exists wh_news (id bigserial primary key, title text, sub text, cat text, author text, date text, tag text, body text, created_at timestamptz default now());`;
  if(t==='wh_categories') return `create table if not exists wh_categories (id bigserial primary key, name text unique, icon text, color text, description text, created_at timestamptz default now());`;
  if(t==='wh_documents') return `create table if not exists wh_documents (id bigserial primary key, name text, size text, type text, doc_type text, negara text, description text, content text, date text, created_at timestamptz default now());`;
  return '';
}

// ── Toast notification ──
function toast(msg,ok=true){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:white;background:${ok?'#085041':'#A32D2D'};box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:7px;transition:opacity .3s`;
  t.innerHTML=`<i class="ti ti-${ok?'check':'alert-circle'}"></i>${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2800);
}

function setLoading(show,msg='Menyimpan...'){
  let el=document.getElementById('sb-loading');

    if(!el){el=document.createElement('div');el.id='sb-loading';el.style.cssText='position:fixed;top:62px;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a3a6b,#2356a8,#1a3a6b);background-size:200%;animation:sbload 1s linear infinite;z-index:999';document.body.appendChild(el);const s=document.createElement('style');s.textContent='@keyframes sbload{0%{background-position:200%}100%{background-position:0%}}';document.head.appendChild(s);}
  }else{el?.remove();}
}

//  UTILS
// ═══════════════════════════════════════════════════
function wc(b){return b?b.split(/\s+/).filter(Boolean).length:0}
function catByName(n){return cats.find(c=>c.name===n)}
function getArt(id){return arts.find(x=>x.id===id)}
function getNews(id){return news.find(x=>x.id===id)}
function setSi(id){document.querySelectorAll('.si').forEach(e=>e.classList.remove('on'));if(id)document.getElementById(id)?.classList.add('on')}
function setNt(id){document.querySelectorAll('.nt').forEach(e=>e.classList.remove('on'));if(id)document.getElementById(id)?.classList.add('on')}
function show(nm){document.querySelectorAll('.pg').forEach(v=>v.classList.remove('on'));document.getElementById('pg-'+nm).classList.add('on');curPg=nm}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fIcon(t){if(!t)return'ti-file-text';if(t.includes('image'))return'ti-photo';if(t.includes('pdf'))return'ti-file-type-pdf';if(t.includes('word')||t.includes('docx'))return'ti-file-type-doc';return'ti-file-text'}
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB'}

function renderSb(){
  const cc={};cats.forEach(c=>{cc[c.name]=arts.filter(a=>a.cat===c.name).length});
  document.getElementById('sb-cats').innerHTML=cats.map(c=>`<div class="si" onclick="gCatFilter('${esc(c.name)}')"><i class="ti ${c.icon}"></i>${esc(c.name)}<span class="n">${cc[c.name]||0}</span></div>`).join('');
  document.getElementById('sb-stats').innerHTML=`<div style="font-size:11px;color:var(--tx2);line-height:1.9">${arts.length} artikel &bull; ${news.length} berita<br>${uploads.length} arsip dokumen<br>${arts.reduce((s,a)=>s+wc(a.body),0).toLocaleString()} kata total</div>`;
}

function gH(){
  setSi('si-home');setNt('nt-home');
  const ln=[...news].sort((a,b)=>b.id-a.id).slice(0,3);
  const la=[...arts].sort((a,b)=>b.id-a.id).slice(0,4);
  const nh=ln.length?ln.map(n=>`<div class="news-item" onclick="vDoc(${n.id},'news')">
    <div class="meta"><span class="badge badge-red">${esc(n.tag)||'Berita'}</span><span class="badge badge-gray">${esc(n.cat)}</span><span><i class="ti ti-calendar"></i>${n.date}</span><span><i class="ti ti-user"></i>${esc(n.author)}</span></div>
    <h3>${esc(n.title)}</h3><p>${esc(n.body.substring(0,130))}...</p></div>`).join('')
    :`<div class="empty"><i class="ti ti-news-off"></i>Belum ada berita.<br><button class="btn btn-sm btn-blue" style="margin-top:8px" onclick="sEd(null,'news')"><i class="ti ti-plus"></i>Tulis Berita</button></div>`;
  const ah=la.length?`<div class="art-grid">`+la.map(a=>`<div class="art-card" onclick="vDoc(${a.id},'art')">

// ═══════════════════════════════════════════════════
//  VIEW DOC
// ═══════════════════════════════════════════════════
function vDoc(id,type){
  setSi(null);
  const d=type==='art'?getArt(id):getNews(id);
  if(!d)return;
  const catObj=catByName(d.cat)||{color:'badge-gray'};

  // Build infobox
  let ibHtml='';
  if(d.iboxData){
    const rows=NEGARA_FIELDS.filter(f=>d.iboxData[f.key]&&d.iboxData[f.key].trim())
      .map(f=>`<tr><td>${f.label}</td><td>${esc(d.iboxData[f.key])}</td></tr>`).join('');
    if(rows){
      const flagHtml=d.flagImg?`<div class="ibox-img"><img src="${d.flagImg}" alt="Bendera"/></div>`:`<div class="ibox-img"><div class="ibox-img-placeholder"><i class="ti ti-flag" style="font-size:24px"></i><span>Belum ada bendera</span></div></div>`;
      ibHtml=`<div class="ibox"><div class="ibox-ttl">${esc(d.title)}</div>${flagHtml}<div class="ibox-body"><table>${rows}</table></div></div>`;
    }
  } else if(d.facts&&d.facts.length){
    const rows=d.facts.map(f=>`<tr><td>${esc(f[0])}</td><td>${esc(f[1])}</td></tr>`).join('');
    ibHtml=`<div class="ibox"><div class="ibox-ttl">${esc(d.title)}</div><div class="ibox-body"><table>${rows}</table></div></div>`;
  }

  // Render body
  const bh=d.body
    .replace(/### (.+)/g,'<h3>$1</h3>')
    .replace(/## (.+)/g,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,' ');
  const sec=d.body.match(/^## .+/gm)||[];
  const tocHtml=sec.length>1?`<div class="toc"><div class="toc-t"><i class="ti ti-list"></i> Daftar Isi</div><ol>${sec.map(s=>`<li>${esc(s.replace('## ',''))}</li>`).join('')}</ol></div>`:'';

  document.getElementById('pg-view').innerHTML=`
    <div class="bc"><span onclick="gH()">WIKIHOUSE FSS</span><i class="ti ti-chevron-right" style="font-size:10px"></i><span onclick="${type==='news'?'gN()':'gA()'}">${type==='news'?'Berita':'Artikel'}</span><i class="ti ti-chevron-right" style="font-size:10px"></i>${esc(d.title)}</div>
    ${type==='news'?`<div class="notice"><i class="ti ti-news" style="font-size:15px;flex-shrink:0"></i>Berita ini diterbitkan oleh <strong>${esc(d.author)}</strong> pada ${d.date}.</div>`:''}
    <div class="${ibHtml?'wl':''}">
      <div>
        <div class="atitle">${esc(d.title)}</div>
        ${d.sub?`<div class="asub">${esc(d.sub)}</div>`:''}
        <hr class="adiv">
        <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:.85rem">
          <span class="badge ${catObj.color}">${esc(d.cat)}</span>
          ${type==='news'?`<span class="badge badge-red">${esc(d.tag||'Berita')}</span>`:''}
          <span style="font-size:11px;color:var(--tx3)"><i class="ti ti-user"></i> ${esc(d.author)}</span>
          <span style="font-size:11px;color:var(--tx3)"><i class="ti ti-calendar"></i> ${d.date}</span>
          <span style="font-size:11px;color:var(--tx3)"><i class="ti ti-file-text"></i> ${wc(d.body)} kata</span>
        </div>
        ${tocHtml}
        ${type==='art'&&d.supportImg?`<div style="margin-bottom:1rem;border-radius:var(--r3);overflow:hidden;border:0.5px solid var(--b3)">
          <img src="${d.supportImg}" alt="Gambar pendukung" style="width:100%;max-height:320px;object-fit:cover;display:block"/>
          ${d.supportCaption?`<div style="padding:6px 10px;font-size:11px;color:var(--tx3);background:var(--bg2);font-style:italic;text-align:center">${esc(d.supportCaption)}</div>`:''}
        </div>`:''}
        <div class="abody"><p>${bh}</p></div>
        <div class="aacts">
          <button class="btn btn-sm" onclick="sEd(${d.id},'${type}')"><i class="ti ti-pencil"></i>Edit</button>
          <button class="btn btn-sm btn-red" onclick="dDoc(${d.id},'${type}')"><i class="ti ti-trash"></i>Hapus</button>
          <button class="btn btn-sm" style="margin-left:auto" onclick="${type==='news'?'gN()':'gA()'}"><i class="ti ti-arrow-left"></i>Kembali</button>
        </div>
      </div>
      ${ibHtml?`<div>${ibHtml}</div>`:''}
    </div>`;
  show('view');
}

function dDoc(id,type){
  if(!confirm('Hapus '+(type==='news'?'berita':'artikel')+' ini?'))return;
  if(type==='art')arts=arts.filter(x=>x.id!==id);else news=news.filter(x=>x.id!==id);
  renderSb();type==='news'?gN():gA();
}

        <h2 style="font-size:15px;font-weight:700">${d?'Edit '+(isArt?'Artikel':'Berita'):(isArt?'Artikel Negara Baru':'Berita Baru')}</h2>
        <span class="badge ${isArt?'badge-blue':'badge-red'}">${isArt?'Artikel Wiki':'Berita'}</span>
      </div>
      <div class="form-card">
        <!-- BASIC INFO -->

        <div class="fg"><label class="fl">Subjudul / deskripsi singkat</label><input type="text" id="e-sub" value="${esc(d?d.sub||'':'')}" placeholder="Deskripsi singkat..."/></div>
        <div class="fr2">
          <div class="fg"><label class="fl">Kategori</label><select id="e-cat">${cats.map(c=>`<option ${d&&d.cat===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
          <div class="fg"><label class="fl">${isArt?'Penulis / Kontributor':'Nama Reporter'}</label><input type="text" id="e-author" value="${esc(d?d.author:(isArt?'Kontributor':'Reporter FSS'))}"/></div>
        </div>
        <div class="fr2">
          <div class="fg"><label class="fl">Tanggal</label><input type="date" id="e-date" value="${d?d.date:new Date().toISOString().split('T')[0]}"/></div>
          <div class="fg"><label class="fl">${isArt?'Tag / Label':'Tag Berita'}</label><input type="text" id="e-tag" value="${esc(d?d.tag||'':(isArt?'':'Terkini'))}" placeholder="${isArt?'Opsional...':'Terkini, Ekonomi...'}"/></div>

function buildIboxEditor(d){
  const ibd=d?.iboxData||{};
  const rows=NEGARA_FIELDS.map((f,i)=>`
    <div class="ibox-field-row">
      <span class="lbl">${esc(f.label)}</span>
      <input type="text" id="ib_${f.key}" value="${esc(ibd[f.key]||'')}" placeholder="—"/>
    </div>`).join('');
  return `
    <div class="form-section"><i class="ti ti-building-castle"></i>Kotak Info Negara (Infobox)</div>
    <div class="notice" style="margin-bottom:.6rem"><i class="ti ti-info-circle" style="flex-shrink:0"></i>Isi field yang relevan. Field kosong tidak akan ditampilkan di halaman artikel.</div>
    <div class="ibox-editor">${rows}</div>`;
}

function previewFlag(input){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=function(e){
    window._currentFlag=e.target.result;
    document.getElementById('flag-zone').innerHTML=`<img src="${e.target.result}" class="flag-preview"/><p style="margin-top:4px;font-size:11px">Klik untuk ganti</p>`;
  };
  r.readAsDataURL(input.files[0]);
}

function previewSupport(input){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=function(e){
    window._currentSupport=e.target.result;
    document.getElementById('support-zone').innerHTML=`<img src="${e.target.result}" style="max-width:100%;max-height:160px;border-radius:var(--r2);object-fit:cover"/><p style="margin-top:5px;font-size:11px">Klik untuk ganti gambar</p>`;
    const cw=document.getElementById('support-caption-wrap');
    if(cw)cw.style.display='block';
  };
  r.readAsDataURL(input.files[0]);
}

function ins(b,a){
  const ta=document.getElementById('e-body');
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+b+sel+a+ta.value.substring(e);
  ta.focus();ta.selectionStart=s+b.length;ta.selectionEnd=s+b.length+sel.length;
  document.getElementById('wc-num').textContent=wc(ta.value);
}

function saveDoc(){
  const title=document.getElementById('e-title').value.trim();
  const body=document.getElementById('e-body').value.trim();
  if(!title||!body){alert('Judul dan isi tidak boleh kosong!');return}
  const isArt=editType==='art';

  // Collect infobox data
  let iboxData=null;
  if(isArt){
    iboxData={};
    NEGARA_FIELDS.forEach(f=>{
      const el=document.getElementById('ib_'+f.key);
      if(el)iboxData[f.key]=el.value.trim();
    });
  }

  const obj={
    title,sub:document.getElementById('e-sub').value.trim(),
    cat:document.getElementById('e-cat').value,
    author:document.getElementById('e-author').value.trim()||'Anonim',
    date:document.getElementById('e-date').value,
    tag:document.getElementById('e-tag').value.trim()||'',
    body,type:editType,facts:[],iboxData,
    flagImg:window._currentFlag||null,
    supportImg:window._currentSupport||null,
    supportCaption:isArt?(document.getElementById('support-caption')?.value.trim()||''):''
  };

  if(editId){
    const arr=isArt?arts:news;
    Object.assign(arr.find(x=>x.id===editId),obj);
    renderSb();vDoc(editId,editType);
  }else{
    const id=nid++;
    if(isArt)arts.unshift({id,...obj});else news.unshift({id,...obj});
    renderSb();vDoc(id,editType);
  }
}

function editCatUI(id){

function delCat(id){

function savePending(){
  const docType=document.getElementById('pd-type').value;
  const negara=document.getElementById('pd-negara').value.trim();
  const desc=document.getElementById('pd-desc').value.trim();
  let saved=0;
  const process=(f,content)=>{
    if(!uploads.some(u=>u.name===f.name&&u.docType===docType)){
      uploads.push({name:f.name,size:fmtSz(f.size),type:f.type||'text/plain',content,docType,negara,desc,date:new Date().toLocaleDateString('id-ID')});
      saved++;
    }
    if(saved===pendingFiles.length||uploads.length%pendingFiles.length===0){
      pendingFiles=[];
      document.getElementById('pending-form').innerHTML='';
      renderSb();renderUpload();
    }
  };
  Array.from(pendingFiles).forEach(f=>{
    const rd=new FileReader();
    rd.onload=e=>process(f,e.target.result);
    if(f.type.startsWith('image/')||f.type==='application/pdf')rd.readAsDataURL(f);
    else rd.readAsText(f);
  });
}

  const res=all.filter(d=>d.title.toLowerCase().includes(q)||d.body.toLowerCase().includes(q)||(d.cat&&d.cat.toLowerCase().includes(q))||(d.sub&&d.sub.toLowerCase().includes(q)));

// MAP: DB row → local object
function rowToArt(r){
  return {id:r.id,type:'art',title:r.title||'',sub:r.sub||'',cat:r.cat||'Negara Fiksi',author:r.author||'',date:r.date||'',tag:r.tag||'',body:r.body||'',facts:[],iboxData:r.ibox_data||{},flagImg:r.flag_img||null,supportImg:r.support_img||null,supportCaption:r.support_caption||''};
}
function rowToNews(r){
  return {id:r.id,type:'news',title:r.title||'',sub:r.sub||'',cat:r.cat||'Negara Fiksi',author:r.author||'',date:r.date||'',tag:r.tag||'',body:r.body||'',facts:[]};
}
function rowToCat(r){
  return {id:r.id,name:r.name,icon:r.icon||'ti-folder',color:r.color||'badge-gray',desc:r.description||''};
}
function rowToDoc(r){
  return {id:r.id,name:r.name,size:r.size,type:r.type,docType:r.doc_type,negara:r.negara||'',desc:r.description||'',content:r.content||'',date:r.date};
}

// LOAD semua data dari Supabase
async function loadAll(){
  setLoading(true);
  try{
    // Artikel
    const ar=await SB.get('wh_articles','?order=id.desc');
    if(ar.length)arts=ar.map(rowToArt);

    // Berita
    const nr=await SB.get('wh_news','?order=id.desc');
    if(nr.length)news=nr.map(rowToNews);

    // Kategori
    const cr=await SB.get('wh_categories','?order=id.asc');
    if(cr.length){
      cats=cr.map(rowToCat);
      catId=Math.max(...cats.map(c=>c.id))+1;
    } else {
      // Seed kategori default ke DB
      for(const c of cats){
        const res=await SB.post('wh_categories',{name:c.name,icon:c.icon,color:c.color,description:c.desc});
        if(res[0])c.id=res[0].id;
      }
    }

    // Dokumen arsip
    const dr=await SB.get('wh_documents','?order=id.desc');
    if(dr.length)uploads=dr.map(rowToDoc);

    // Update nid
    const allIds=[...arts.map(a=>a.id),...news.map(n=>n.id)];
    if(allIds.length)nid=Math.max(...allIds)+1;

    toast('Data berhasil dimuat dari Supabase ✓');
  }catch(e){
    console.error('Supabase load error:',e);
    toast('Gagal memuat data: '+e.message,false);
  }
  setLoading(false);
  renderSb();gH();
}

// ── SAVE ARTIKEL ──
async function sbSaveArt(obj,isNew){
  const payload={
    title:obj.title,sub:obj.sub,cat:obj.cat,author:obj.author,
    date:obj.date,tag:obj.tag,body:obj.body,
    ibox_data:obj.iboxData||{},
    flag_img:obj.flagImg||null,
    support_img:obj.supportImg||null,
    support_caption:obj.supportCaption||''
  };
  if(isNew){
    const res=await SB.post('wh_articles',payload);
    return res[0]?.id;
  }else{
    await SB.patch('wh_articles',payload,`?id=eq.${obj.id}`);
    return obj.id;
  }
}

// ═══════════════════════════════════════════════════
//  OVERRIDE saveDoc → simpan ke Supabase
// ═══════════════════════════════════════════════════
async function saveDoc(){
  const title=document.getElementById('e-title').value.trim();
  const body=document.getElementById('e-body').value.trim();
  if(!title||!body){alert('Judul dan isi tidak boleh kosong!');return}
  const isArt=editType==='art';

  let iboxData=null;
  if(isArt){
    iboxData={};
    NEGARA_FIELDS.forEach(f=>{
      const el=document.getElementById('ib_'+f.key);
      if(el)iboxData[f.key]=el.value.trim();
    });
  }

  const obj={
    title,sub:document.getElementById('e-sub').value.trim(),
    cat:document.getElementById('e-cat').value,
    author:document.getElementById('e-author').value.trim()||'Anonim',
    date:document.getElementById('e-date').value,
    tag:document.getElementById('e-tag').value.trim()||'',
    body,type:editType,facts:[],iboxData,
    flagImg:window._currentFlag||null,
    supportImg:window._currentSupport||null,
    supportCaption:isArt?(document.getElementById('support-caption')?.value.trim()||''):''
  };

  setLoading(true);
  try{
    const isNew=!editId;
    let savedId;
    if(isArt){
      savedId=await sbSaveArt(obj,isNew);
      if(isNew){arts.unshift({id:savedId,...obj});}
      else{Object.assign(arts.find(x=>x.id===editId),obj);}
    }else{
      savedId=await sbSaveNews(obj,isNew);
      if(isNew){news.unshift({id:savedId,...obj});}
      else{Object.assign(news.find(x=>x.id===editId),obj);}
    }
    toast((isNew?'Berhasil disimpan':'Berhasil diperbarui')+' ke Supabase ✓');
    renderSb();vDoc(savedId,editType);
  }catch(e){
    toast('Gagal menyimpan: '+e.message,false);
    console.error(e);
  }
  setLoading(false);
}

// ═══════════════════════════════════════════════════
//  OVERRIDE dDoc → hapus dari Supabase
// ═══════════════════════════════════════════════════
async function dDoc(id,type){
  if(!confirm('Hapus '+(type==='news'?'berita':'artikel')+' ini dari database?'))return;
  setLoading(true);
  try{
    await sbDel(type==='art'?'wh_articles':'wh_news',id);
    if(type==='art')arts=arts.filter(x=>x.id!==id);else news=news.filter(x=>x.id!==id);
    toast('Berhasil dihapus dari Supabase ✓');
    renderSb();type==='news'?gN():gA();
  }catch(e){toast('Gagal menghapus: '+e.message,false);}
  setLoading(false);
}

}
async function updateCat(id){
  const name=document.getElementById('nc-name').value.trim();
  const desc=document.getElementById('nc-desc').value.trim();
  if(!name){alert('Nama tidak boleh kosong!');return}
  setLoading(true);
  try{
    const c=cats.find(x=>x.id===id);if(!c)return;
    c.name=name;c.desc=desc;
    await sbSaveCat(c,false);
    toast('Kategori diperbarui ✓');gCats();
  }catch(e){toast('Gagal: '+e.message,false);}
  setLoading(false);
}
async function delCat(id){
  const c=cats.find(x=>x.id===id);
  const cnt=arts.filter(a=>a.cat===c?.name).length;
  if(cnt>0&&!confirm(`Kategori "${c.name}" memiliki ${cnt} artikel. Hapus tetap?`))return;
  setLoading(true);
  try{
    await sbDel('wh_categories',id);
    cats=cats.filter(x=>x.id!==id);
    toast('Kategori dihapus ✓');gCats();
  }catch(e){toast('Gagal: '+e.message,false);}
  setLoading(false);
}

// ═══════════════════════════════════════════════════
//  OVERRIDE savePending (dokumen arsip) → Supabase
// ═══════════════════════════════════════════════════
async function savePending(){
  const docType=document.getElementById('pd-type').value;
  const negara=document.getElementById('pd-negara').value.trim();
  const desc=document.getElementById('pd-desc').value.trim();
  setLoading(true);
  try{
    for(const f of pendingFiles){
      await new Promise((resolve,reject)=>{
        const rd=new FileReader();
        rd.onload=async function(e){
          try{
            const content=e.target.result;
            const docObj={name:f.name,size:fmtSz(f.size),type:f.type||'text/plain',content,docType,negara,desc,date:new Date().toLocaleDateString('id-ID')};
            // Dokumen besar (gambar/pdf base64) — simpan konten terpotong di DB, simpan penuh di lokal
            const dbContent=typeof content==='string'&&content.length>500000?content.substring(0,500000)+'[TERPOTONG]':content;
            const savedId=await sbSaveDoc({...docObj,content:dbContent});
            uploads.push({...docObj,id:savedId});
            resolve();
          }catch(err){reject(err);}
        };
        rd.onerror=reject;
        if(f.type.startsWith('image/')||f.type==='application/pdf')rd.readAsDataURL(f);
        else rd.readAsText(f);
      });
    }
    pendingFiles=[];
    document.getElementById('pending-form').innerHTML='';
    toast(`${uploads.length} dokumen berhasil disimpan ke Supabase ✓`);
    renderSb();renderUpload();
  }catch(e){
    toast('Gagal menyimpan dokumen: '+e.message,false);
    console.error(e);
  }
  setLoading(false);
}

// OVERRIDE delUp → hapus dari Supabase
async function delUp(i){
  if(!confirm('Hapus dokumen ini dari arsip Supabase?'))return;
  const f=uploads[i];
  setLoading(true);
  try{
    if(f.id)await sbDel('wh_documents',f.id);
    uploads.splice(i,1);
    toast('Dokumen dihapus dari Supabase ✓');renderSb();renderUpload();
  }catch(e){toast('Gagal hapus: '+e.message,false);}
  setLoading(false);
}

  document.head.appendChild(ss);
  show('home');
  await loadAll();
})();
</script>

function mcSetMood(mood,btn){
  mcMood=mood;
  document.querySelectorAll('.mc-mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const suggs=MC_SUGGS_BY_MOOD[mood]||MC_SUGGS_BY_MOOD.normal;
  document.getElementById('mc-sugg').innerHTML=suggs.map(s=>`<button onclick="mcAsk('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}

function mcToggle(){
  mcOpen=!mcOpen;
  document.getElementById('mc-panel').classList.toggle('open',mcOpen);
  if(mcOpen&&mcHistory.length===0){
    const greets=[
      'Halo! Saya **Mbak Cinta** 🌸, asisten AI untuk WIKIHOUSE FSS.\n\nSaya bisa ngobrol bebas, bantu riset tentang negara fiksi, bantu nulis artikel, dan menjawab pertanyaan apapun seputar wiki ini. Mau mulai dari mana? 😊',
      'Selamat datang di WIKIHOUSE FSS! 🌸 Saya **Mbak Cinta**, siap membantu kamu menjelajahi ensiklopedia negara fiksi ini.\n\nTanya apa saja ya — soal negara, berita, cara pakai wiki, atau topik apa pun! ✨',
      '**Mbak Cinta** hadir untuk kamu! 🌸\n\nSaya adalah asisten AI yang tahu semua tentang WIKIHOUSE FSS. Bisa tanya soal negara fiksi, minta bantuan nulis, atau sekadar ngobrol santai. Ada yang bisa saya bantu? 😊'
    ];
    mcAddMsg('bot',greets[Math.floor(Math.random()*greets.length)]);
    mcRenderSugg();
    setTimeout(()=>document.getElementById('mc-input').focus(),300);
  } else if(mcOpen){
    setTimeout(()=>document.getElementById('mc-input').focus(),300);
  }
}

function mcRenderSugg(){
  const suggs=MC_SUGGS_BY_MOOD[mcMood]||MC_SUGGS_BY_MOOD.normal;
  document.getElementById('mc-sugg').innerHTML=suggs.map(s=>`<button onclick="mcAsk('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}

function mcFmt(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px;font-size:11px">$1</code>')
    .replace(/^[-•] (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul style="margin:.3rem 0 .3rem .8rem">$1</ul>')
    .replace(/\n\n/g,'</p><p style="margin-top:6px">')
    .replace(/\n/g,'<br>');
}

function mcNow(){
  return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}

function mcClear(){
  if(mcHistory.length===0)return;
  if(!confirm('Hapus semua percakapan dengan Mbak Cinta?'))return;
  mcHistory=[];
  document.getElementById('mc-msgs').innerHTML='';
  document.getElementById('mc-sugg').innerHTML='';
  mcAddMsg('bot','Percakapan telah dihapus. Halo lagi! 🌸 Ada yang bisa saya bantu?');
  mcRenderSugg();
}

const MC_PROXY = 'https://script.google.com/macros/s/AKfycbz4dsqBvx-cg7wqhKAKkfBWZVb4d7B5lfseXGXu4ca4RDey_RyasJad_hiSwtjClTBuWg/exec';
function mcGetKey(){return localStorage.getItem('mc_gemini_key')||'';}
function mcSaveKey(k){localStorage.setItem('mc_gemini_key',k.trim());}

function mcShowSetupPrompt(){
  document.getElementById('mc-key-prompt')?.remove();
  const el=document.getElementById('mc-msgs');
  const div=document.createElement('div');
  div.id='mc-key-prompt';
  div.style.cssText='background:#fffbeb;border:1px solid #f5d79e;border-radius:12px;padding:12px;margin:6px 0;font-size:12px;';
  div.innerHTML=`
    <div style="font-weight:700;color:#633806;margin-bottom:8px">🔑 Masukkan Gemini API Key</div>
    <div style="color:#7c5a1e;margin-bottom:8px;line-height:1.6">
      Ambil API Key gratis di <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--ac2)">aistudio.google.com/apikey</a><br>
      Klik <b>Create API Key</b> → copy → paste di sini:
    </div>
    <div style="margin-bottom:10px">
      <input type="password" id="mc-key-input" placeholder="AIzaSy..." value="${mcGetKey()}" style="width:100%;border:0.5px solid #f5d79e;border-radius:8px;padding:8px 10px;font-size:12px;background:white;outline:none;font-family:var(--font);box-sizing:border-box"/>
    </div>
    <button onclick="mcSubmitSetup()" style="width:100%;background:#1a3a6b;color:white;border:none;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600">Simpan & Mulai Chat ✓</button>`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  setTimeout(()=>document.getElementById('mc-key-input')?.focus(),100);
}

function mcSubmitSetup(){
  const k=document.getElementById('mc-key-input')?.value.trim();
  if(!k||!k.startsWith('AIza')){alert('API Key tidak valid. Harus dimulai dengan "AIza..."');return;}
  mcSaveKey(k);
  document.getElementById('mc-key-prompt')?.remove();
  mcAddMsg('bot','API Key tersimpan! 🎉 Mbak Cinta siap ngobrol sekarang. Mau tanya apa? 😊');
  mcRenderSugg();
}

function mcChangeKey(){
  mcAddMsg('bot','Oke, masukkan API Key Gemini kamu ya 🔑');
  mcShowSetupPrompt();
}

async function mcSend(){
  const inp=document.getElementById('mc-input');
  const q=inp.value.trim();if(!q)return;

  const apiKey=mcGetKey();
  if(!apiKey){
    inp.value='';inp.style.height='auto';
    mcAddMsg('user',q);
    mcAddMsg('bot','Sebelum ngobrol, perlu input API Key Gemini dulu ya! 🔑\n\nGratis dari Google, ikuti instruksi di bawah:');
    mcShowSetupPrompt();
    return;
  }

  inp.value='';inp.style.height='auto';
  document.getElementById('mc-send-btn').disabled=true;
  document.getElementById('mc-sugg').innerHTML='';
  mcAddMsg('user',q);
  mcShowTyping();

  const artCtx=arts.slice(0,30).map(a=>`[ARTIKEL] "${a.title}" (Kategori: ${a.cat}, Penulis: ${a.author}, Tgl: ${a.date})\nDeskripsi: ${(a.sub||'').substring(0,80)}\nIsi: ${a.body.replace(/##.+\n?/g,'').trim().substring(0,200)}`).join('\n\n');
  const newsCtx=news.slice(0,15).map(n=>`[BERITA] "${n.title}" (${n.date}, Reporter: ${n.author}, Tag: ${n.tag||'-'})\n${n.body.substring(0,150)}`).join('\n\n');
  const catCtx=cats.map(c=>`- ${c.name}: ${c.desc||'(no desc)'}`).join('\n');
  const moodExtra=MC_MOODS[mcMood]?.system||MC_MOODS.normal.system;

  const sysPrompt=`Kamu adalah Mbak Cinta 🌸, asisten AI cerdas untuk WIKIHOUSE FSS — ensiklopedia negara fiksi.

Kepribadian: ${moodExtra}

Kemampuanmu:
- Menjawab pertanyaan seputar isi wiki (artikel, berita, kategori)
- Membantu riset dan penulisan artikel negara fiksi
- Menjawab pertanyaan umum dan pengetahuan luas (di luar wiki)
- Membantu brainstorming lore, sejarah, politik negara fiksi

Konteks WIKIHOUSE FSS saat ini:
Total: ${arts.length} artikel, ${news.length} berita, ${cats.length} kategori, ${uploads.length} dokumen arsip

Kategori: ${catCtx||'(belum ada)'}

Artikel terbaru:
${artCtx||'(belum ada artikel)'}

Berita terbaru:
${newsCtx||'(belum ada berita)'}

Instruksi:
- Referensikan data wiki jika relevan
- Jawab pertanyaan umum dari pengetahuan sendiri
- Gunakan bahasa Indonesia natural sesuai mood`;

  const histMsgs=mcHistory
    .filter((_,i)=>i<mcHistory.length-1)
    .slice(-16)
    .map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));

  try{
    const res=await fetch(MC_PROXY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        apiKey,
        system_instruction:{parts:[{text:sysPrompt}]},
        contents:[...histMsgs,{role:'user',parts:[{text:q}]}],
        generationConfig:{maxOutputTokens:1000,temperature:0.8}
      })
    });
    const data=await res.json();
    mcHideTyping();
    if(data.error){
      const msg=data.error.message||'';
      if(msg.includes('API_KEY')||msg.includes('key')||data.error.code===400||data.error.code===403){
        mcAddMsg('bot','API Key sepertinya tidak valid 😅 Coba periksa lagi ya:');
        mcSaveKey('');mcShowSetupPrompt();
      } else {
        mcAddMsg('bot','Ada gangguan: '+msg+' 😅 Coba lagi ya!');
      }
    } else {
      const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Maaf ada gangguan 😅';
      mcAddMsg('bot',reply);
      if(mcMsgCount%4===0){mcRenderSugg();}
    }
  }catch(e){
    mcHideTyping();
    mcAddMsg('bot','Gagal terhubung 😅 Coba refresh halaman dan coba lagi ya!');
  }
  document.getElementById('mc-send-btn').disabled=false;
  setTimeout(()=>document.getElementById('mc-input').focus(),100);
}
</script>
</body>
</html>
